name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/pyproject.toml"
      - name: Install dependencies
        run: pip install -r requirements.in -r requirements-dev.in
      - name: Check config schema
        run: python tools/check_config_schema.py
      - name: Check config mirror drift (Phase 11.3)
        run: PYTHONPATH=$PYTHONPATH:. python tools/config_mirror_legacy.py --check
      - name: Check documentation drift
        run: PYTHONPATH=$PYTHONPATH:. python tools/doc_drift_check.py
      - name: Check live dependency boundaries
        run: bash scripts/diagnostics/check_live_deps.sh
      - name: Lint with ruff
        run: |
          ruff check . --output-format=github
          ruff format . --check
      - name: Type check with mypy
        run: mypy
      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r paper_trading/ eigencapital/ features/ shared/ --quiet --severity-level high
      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit --desc on --strict 2>&1 | head -50
      # Dashboard lint check — TypeScript (uses yarn for reproducible installs)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: paper_trading/dashboard/yarn.lock
      - name: Install dashboard deps
        run: |
          cd paper_trading/dashboard
          yarn install --frozen-lockfile
      - name: Check dashboard types
        run: |
          cd paper_trading/dashboard
          yarn tsc -b --noEmit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/pyproject.toml"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.in -r requirements-dev.in
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: paper_trading/dashboard/yarn.lock
      - name: Build dashboard
        run: |
          cd paper_trading/dashboard
          yarn install --frozen-lockfile
          yarn build
      - name: Run dashboard unit tests (vitest)
        run: |
          cd paper_trading/dashboard
          yarn vitest run --reporter verbose
      - name: Run Python tests
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ -v --tb=short -x
      - name: Run tests with coverage
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ \
            --cov=. --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70 -v --tb=short -x
      - name: Mutation tests
        run: python -m pytest tests/mutation/ -v --tb=short -q
      - name: Chaos tests
        run: python -m pytest tests/chaos/ -v --tb=short -q
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
