# rolling_window_bars is now dynamic — computed as retrain_window * 252 in asset_engine.py
# (e.g. retrain_window=10 → 2520 bars). Remove the static default here so the dynamic
# default in asset_engine.py takes effect instead of silently capping training to ~3y.
# rolling_window_bars: 756
churn_ratio_threshold: 0.35
cooldown_half_life_hours: 4.0
cooldown_max_penalty_pct: 20.0
entry_defer_max_bars: 5
min_flip_interval_bars: 3
max_entry_slippage_pct: 2.0
profit_lock_threshold_pct: 15.0
max_position_pct_of_equity: 0.15
max_risk_per_trade_pct: 2.0
min_viable_position_pct: 0.01
size_taper_start_dd: -0.03
size_taper_end_dd: -0.10
size_taper_min: 0.3
max_positions_per_asset: 2
max_concurrent_positions: 13
max_daily_loss_pct: 0.08
min_risk_per_trade_pct: 0.001
portfolio_max_leverage: 2.0
portfolio_leverage_tolerance: 0.001
mt5_leverage_budget_enabled: false
mt5_leverage_budget_soft: true
net_short_concentration_threshold: 0.75
mt5_enable_max_risk_per_trade_pct: true
mt5_max_risk_per_trade_pct: 2.0
mt5_bypass_risk_cap_at_min_lot: false
min_confidence: 55.0
min_confidence_buy: 45.0  # Lower for BUY — portfolio avg WR ~41% vs SELL ~72%
min_confidence_sell: 55.0  # Standard — SELL signals are well-calibrated

# Stacking — same-side position addition (pyramiding)
# Enabled: allows up to max_positions_per_asset positions simultaneously
# See StackingGate for full gate documentation (IV-1 through IV-8)
stacking:
  enabled: true
  dry_run: false
  max_layers: 2
  min_confidence: 0.60
  min_stack_r: 0.5
  stack_spacing_r: 0.5
  adx_threshold: 25
  stack_sl_tighten: 0.5
  size_cap: 1.0
  layer_multipliers: [0.8, 0.5]
  stack_target_vol: 0.15
  stack_vol_clamp: [0.3, 1.2]
  min_viable_position_pct: 0.01
  # Stack minimum-size floor: at least `min_stack_size_factor × min_lots`
  # where `min_lots = min_viable_position_pct × capital_base / (price × lot_multiplier)`.
  # Uses proper unit conversion (notional → lots via _contract_size_from_ticker)
  # so that USD notional is correctly scaled to base_entry_size units.
  # Set to 0.0 to disable the floor.
  min_stack_size_factor: 0.5
  stack_micro_threshold: 0.0
  # Position protection thresholds (used by PositionProtection)
  breakeven_threshold_r: 0.5
  trail_activate_r: 1.0
  trail_distance_r: 0.5
