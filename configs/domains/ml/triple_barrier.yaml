# Triple-barrier label parameters — deterministic, no labeling this file.
#
# Migrated from features/registry.ASSET_LABEL_PARAMS (Phase 6). Each entry
# defines the pt (take-profit multiplier), sl (stop-loss multiplier), and
# optional vol_method / atr_period used by the triple-barrier labeling
# pipeline. YAML format chosen so changes audit cleanly in source control
# and so the cross-file validator (tools/check_config_schema.py) can
# detect drift against per-asset blocks under configs/domains/assets/.
#
# Conventions:
#   pt, sl              — multipliers on the volatility basis (ATR or EWM)
#   vol_method          — "atr" (ATR-based barriers) or "ewm_100" (default)
#   atr_period          — ATR lookback; only meaningful when vol_method="atr"
#   active              — false marks REMOVED assets kept here for archival
#                         backtest reproducibility (see notes in each entry)

legacy:
  default_vol_method: ewm_100
  default_atr_period: 14

