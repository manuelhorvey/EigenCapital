# Label Strategy Registry — single source of truth for training labels.
#
# Decouples the learning objective (label_strategy) from the execution
# PT/SL geometry (triple_barrier.yaml). Each asset selects a labeling
# strategy with asset-specific parameters, lifecycle status, and validation
# evidence linking back to the label optimization experiment.
#
# Lifecycle states:
#   exploratory         — initial experiment, not yet validated
#   validated           — passed promotion gates on sentinel assets
#   production_candidate — passed all gates, pending portfolio simulation
#   deployed            — active in live paper trading
#   deprecated           — replaced by a newer strategy
#
# See research/label_optimization/ for experiment methodology.
# See research/portfolio_validation/ for portfolio A/B simulation.

