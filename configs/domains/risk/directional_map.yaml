# EigenCapital — Per-Asset Directional Classification Map
#
# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  SHADOW / OBSERVATION-ONLY CONFIG                                       ║
# ║                                                                         ║
# ║  This file documents the current directional-skill classification for   ║
# ║  each asset in the 22-asset portfolio. The engine loads this config to   ║
# ║  LOG the per-asset directional constraint (e.g. in state.json or the     ║
# ║  alerter), but does NOT enforce any direction filter from this file.     ║
# ║                                                                         ║
# ║  The authoritative ENFORCED direction filter remains the                 ║
# ║  SELL_ONLY_ASSETS list in configs/domain_models/risk.py (SellOnlyConfig)║
# ║  and the `get_sell_only_assets()` function in                            ║
# ║  paper_trading/execution/gate_constants.py.                             ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# Methodology
# ===========
# Classification was determined through a systematic end-to-end investigation
# (July 2026) that analyzed:
#
#   1. Raw (uncalibrated) p_long probability distribution spread & mean
#   2. Calibrated signal BUY/SELL trade counts and win rates
#   3. Production trade lifecycle R-multiple contribution by direction
#   4. Walk-forward stability across rolling windows (365d window, 182d step)
#   5. Calibration dependency (how much the model relies on calibration to
#      produce viable signals)
#   6. Calibrator Platt coefficients — simulated calibrated signal performance
#      from raw walk-forward p_long values
#
# Tiers
# =====
#   BIDIRECTIONAL   — Both BUY and SELL have positive expectancy.
#                     Calibration improves confidence but is not required
#                     to discover direction.
#
#   SELL_STRONG     — SELL has strong positive expectancy; BUY has
#                     negative or near-zero expectancy. Raw model may be
#                     inverted (always predicts BUY) or collapsed (always
#                     neutral). Calibration corrects the inversion and
#                     reveals SELL alpha.
#
#   BUY_STRONG      — BUY has positive expectancy; SELL has negative or
#                     near-zero expectancy. The model naturally predicts
#                     BUY direction.
#
#   SELL_LEANING    — SELL is preferred but BUY shows marginal positive
#                     expectancy. Not strong enough to classify as fully
#                     SELL_STRONG. Monitor for directional drift.
#
#   NEUTRAL         — No reliable directional edge. Directional performance
#                     is negative or inconsistent across windows. Asset may
#                     be degrading and needs remedial action (depth revert,
#                     feature additions, or removal consideration).
#
# Revision history
# ================
# 2026-07-16  v2 — Updated with fresh_v2 retrained model stability analysis
#             (21 assets) and calibration impact simulation (4 key assets).
# 2026-07-16  v2.1 — EURCAD reclassified NEUTRAL→SELL_STRONG. Full 22-asset
#             calibration impact analysis showed raw SELL R=+444.87 vs
#             raw BUY R=+39.50. The -76.78R NEUTRAL finding was an
#             R-computation bug in the stability analysis.
# 2026-07-16  v2.2 — EURNZD and NZDUSD reclassified NEUTRAL→SELL_STRONG.
#             Both were also victims of the stability-analysis R bug.
#             EURNZD: raw SELL R=+717.92 (actually improved from +65R v1)
#             NZDUSD: raw SELL R=+899.13 (variance compressed but correct)
#             Key changes (items marked † are R-bug corrections to v2):
#             - GBPCHF: SELL_STRONG → NEUTRAL (collapsed model, std 0.0023)
#             - EURCAD: BUY_STRONG → NEUTRAL † (corrected: SELL_STRONG +445R)
#             - EURNZD: SELL_STRONG → NEUTRAL † (corrected: SELL_STRONG +718R)
#             - NZDUSD: SELL_STRONG → NEUTRAL † (corrected: SELL_STRONG +899R)
#             - AUDUSD: BIDIRECTIONAL → NEUTRAL (near-zero, -2.29R)
#             - GBPJPY: BIDIRECTIONAL → BUY_STRONG (shifted direction)
#             - USDCAD: BIDIRECTIONAL → SELL_STRONG (shifted to SELL)
#             - GBPCAD: BIDIRECTIONAL → SELL_STRONG (shifted to SELL)
#             - EURCHF: kept SELL_STRONG (calibration recovers +494R from
#               raw -90R; the inversion is fully correctable)
#             - NZDCAD: kept SELL_STRONG (corrected R shows +972R SELL
#               profit; previous -285R was from a computation bug)
#             - GC: kept BIDIRECTIONAL (corrected R shows +536R raw / +161R
#               calibrated, both directions profitable)
# 2026-07-16  v3 — Feature remediation cycle (feature_fix_v3 retrain).
#             GBPCHF FIXED: added 126 momentum window → hit_rate +0.730,
#             100% SELL (was collapsed at std 0.0023). NZDUSD/AUDUSD
#             did not respond to feature additions. EURCHF unchanged.
# 2026-07-15  v1 — Initial classification from comprehensive directional audit.

metadata:
  version: 3
  date: 2026-07-16
  methodology: >-
    End-to-end directional audit: raw p_long distribution (fresh_v2
    walk-forward), calibrated signal simulation via DirectionalPlatt,
    rolling-window stability analysis (365d window, 182d step),
    calibration dependency analysis.
  source_investigations:
    - Phase 1: fresh_v2 walk-forward signal parquet analysis
    - Phase 2: Directional stability analysis (21 assets, rolling windows)
    - Phase 3: Calibration impact simulation (4 degraded assets)
    - Phase 4: Calibrator Platt coefficient analysis
    - Phase 5: Trade lifecycle attribution (fresh_v2 signals, corrected R)
  shadow_only: true
  notes: >-
    This map is for logging and monitoring only. Directional enforcement
    should remain with the SELL_ONLY filter in SellOnlyConfig and the
    direction-conditional thresholds (min_confidence_buy/min_confidence_sell)
    in sizing.yaml. Several assets show low temporal stability (<60%) —
    classifications may shift after the next retrain cycle.

