<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EigenCapital — Paper Trading Dashboard</title>
    <meta name="description" content="Real-time quantitative trading dashboard" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#07080b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://127.0.0.1:5000; frame-ancestors 'none'" />
    <script>
      (function() {
        try {
          var t = localStorage.getItem('ec_theme');
          if (t === 'light' || (t !== 'dark' && matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="bg-app text-primary font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
