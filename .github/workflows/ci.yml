name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/pyproject.toml"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Check config schema
        run: python tools/check_config_schema.py
      - name: Check live dependency boundaries
        run: bash scripts/diagnostics/check_live_deps.sh
      - name: Lint with ruff
        run: |
          ruff check . --output-format=github
          ruff format . --check
      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r paper_trading/ eigencapital/ features/ shared/ --exit-zero --quiet
      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit --desc on 2>&1 | head -50 || echo "pip-audit found issues (non-blocking)"
      # Dashboard lint check — TypeScript
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: paper_trading/dashboard/package.json
      - name: Check dashboard types
        run: |
          cd paper_trading/dashboard
          npm ci && npx tsc -b --noEmit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/pyproject.toml"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: paper_trading/dashboard/package.json
      - name: Build dashboard
        run: |
          cd paper_trading/dashboard
          npm ci && npm run build
      - name: Run dashboard unit tests (vitest)
        run: |
          cd paper_trading/dashboard
          npx vitest run --reporter verbose
      - name: Run Python tests
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ -v --tb=short -x
      - name: Run tests with coverage
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ \
            --cov=. --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70 -v --tb=short -x
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
