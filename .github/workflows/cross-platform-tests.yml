# Cross-Platform Tests
#
# Validates that the platform abstraction layer (eigencapital.platform.*)
# works identically on Linux and Windows.  Runs on every push to main and
# on every PR.
#
# The main CI workflow (ci.yml) handles full-coverage testing on Linux
# (lint, typecheck, mutation, chaos, dashboard build, etc.).  This workflow
# is a focused complement that catches OS-specific regressions early.
#
# Key design decisions:
#   * Runs the full mocked platform test suite on both OSes
#   * Validates that all platform modules import cleanly
#   * Runs core integration smoke tests that should be OS-independent
#   * Skips MT5-dependent tests on Windows (MetaTrader5 is Wine-only)
#   * Skips shell-script / procfs tests on Windows
#   * Writes a formatted summary to GITHUB_STEP_SUMMARY for each OS run

name: Cross-Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:

  # ── Platform abstraction tests (Linux + Windows) ──────────────────────────
  # These tests mock psutil, subprocess, os.kill, socket, sys.platform, and
  # os.environ so they produce deterministic results regardless of the host OS.
  # Running them on both platforms validates that the mocks themselves are
  # platform-independent and that no host-OS leakage occurs.

  platform-unit:
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash  # Windows GitHub runners include Git-Bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.in
            requirements-dev.in
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.in -r requirements-dev.in

      - name: Validate platform modules import cleanly
        run: |
          python -c "
          from eigencapital.platform.detector import detect, PlatformDetector, PlatformType, DeploymentMode
          from eigencapital.platform.paths import PathResolver
          from eigencapital.platform.signals import ShutdownManager, install_graceful_shutdown, register_shutdown_handler
          from eigencapital.platform.process import ProcessInfo, find_process_by_name, is_process_running, kill_process, wait_for_port
          print('✅ All 7 platform module symbols import OK')
          d = detect()
          print(f'   Platform: {d.platform_tag}  Wine: {d.is_wine}  Mode: {d.deployment_mode}')
          "

      - name: Run platform abstraction unit tests
        run: |
          python -m pytest tests/test_platform_detector.py \
                         tests/test_platform_signals.py \
                         tests/test_platform_paths.py \
                         tests/test_platform_process.py \
                         -v --tb=short --no-header \
                         -o "log_cli=false"

      - name: Run MT5 strategy tests (mocked)
        # These tests mock shutil.which, subprocess.Popen, and Path.exists,
        # so they run cleanly even without MT5 or Wine installed.
        run: |
          python -m pytest tests/test_platform_mt5_strategies.py \
                         -v --tb=short --no-header \
                         -o "log_cli=false"

      - name: Run MT5 bridge manager tests (mocked)
        # These tests mock socket.create_connection, subprocess.Popen, and
        # the strategy classes, so they work on any OS.
        run: |
          python -m pytest tests/test_platform_mt5_bridge_manager.py \
                         -v --tb=short --no-header \
                         -o "log_cli=false"

      - name: Run core config and schema tests
        continue-on-error: true
        run: |
          python -m pytest tests/tools/test_config_validator.py \
                         -v --tb=short --no-header \
                         -o "log_cli=false"
          python -c "
          # Verify config schema tool works cross-platform
          from tools.check_config_schema import main as check_schema
          print('✅ config schema checker import OK')
          "

      - name: Run cross-platform smoke tests
        continue-on-error: true
        run: |
          # Smoke test: verify that core fixtures load on both platforms
          python -c "
          import pytest
          from tests.conftest import sample_price_data, sample_macro_data
          print('✅ Core test fixtures import OK')
          "

      - name: Static check — no bare plaintext secrets
        continue-on-error: true
        run: |
          python tools/check_no_plaintext_secrets.py

      - name: Summary
        run: |
          echo "## Cross-Platform Test Summary (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Suite | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform module imports | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform unit tests | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MT5 strategies (mocked) | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MT5 bridge manager (mocked) | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Core config + schema | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fixture smoke test | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static checks | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**OS:** ${{ matrix.os }}  **Python:** ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
