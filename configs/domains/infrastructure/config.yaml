# Infrastructure / operational config — simple scalars consumed by EngineConfig
#
# These keys were previously carried as legacy_extras from paper_trading.yaml.
# Phase 12.3 promotes them to the domain tree so they have an explicit home.
#
# Conventions:
#   data_source   — "mt5" or "yfinance"
#   rebalance     — "daily", "weekly", "monthly", or "none"
#   research_mode — when true, bypasses certain production guards
#   retrain_freq  — "annual" or "quarterly"
#   retrain_window — number of past models to keep
#   api_token     — dashboard bearer token; primarily set via EIGENCAPITAL_API_TOKEN env var

data_source: mt5
rebalance: daily
research_mode: false
retrain_freq: annual
retrain_window: 5
api_token: ""
