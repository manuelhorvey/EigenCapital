# ── Mode selector ───────────────────────────────────────────────────────────
# Active mode name; resolves overrides from the `modes:` section below.
# Values set at the top level (capital, portfolio_drawdown_limit, defaults.*)
# serve as the base config, then mode-specific overrides are merged on top.
mode: production

modes:
  production:
    description: "Standard paper trading — 16-asset, 0.95 base size, factor-constrained RP"
    capital: 100000
    defaults:
      max_risk_per_trade_pct: 2.0
      min_risk_per_trade_pct: 0.001
      risk_per_trade_pct: 0.02
      max_daily_loss_pct: 0.08
      max_concurrent_positions: 8
      factor_exposure_limits:
        CHF: 0.20
        US_EQUITY: 0.25
        OIL: 0.15
        GOLD: 0.15
        AUD: 0.25
        NZD: 0.25
        JPY: 0.25
        FX_MAJOR: 0.40
        FX_CROSS: 0.40
        FX_COMMODITY: 0.25
    portfolio_drawdown_limit: -0.15

  challenge_ftmo_10k:
    description: "FTMO 10K challenge — tighter risk, 5% DD max, 5 concurrent"
    capital: 10000
    defaults:
      max_risk_per_trade_pct: 0.03
      min_risk_per_trade_pct: 0.001
      risk_per_trade_pct: 0.01
      max_daily_loss_pct: 0.04
      max_concurrent_positions: 5
      factor_exposure_limits:
        CHF: 0.15
        US_EQUITY: 0.15
        OIL: 0.10
        GOLD: 0.10
        AUD: 0.20
        NZD: 0.20
        JPY: 0.20
        FX_MAJOR: 0.30
        FX_CROSS: 0.30
        FX_COMMODITY: 0.15
    portfolio_drawdown_limit: -0.08

  live:
    description: "Live funded account — full conservatism, 10% DD max, 6 concurrent"
    capital: 100000
    defaults:
      max_risk_per_trade_pct: 0.03
      min_risk_per_trade_pct: 0.002
      risk_per_trade_pct: 0.01
      max_daily_loss_pct: 0.05
      max_concurrent_positions: 6
      factor_exposure_limits:
        CHF: 0.15
        US_EQUITY: 0.20
        OIL: 0.10
        GOLD: 0.10
        AUD: 0.20
        NZD: 0.20
        JPY: 0.20
        FX_MAJOR: 0.30
        FX_CROSS: 0.30
        FX_COMMODITY: 0.15
    portfolio_drawdown_limit: -0.10

capital: 100000
position_size: 0.95
rebalance: daily
retrain_freq: annual
retrain_window: 5
research_mode: false
data_source: mt5
mt5:
  enabled: true
  bridge_host: 127.0.0.1
  bridge_port: 9879
  # min_lot: REMOVED 2026-06-29 — _quantity_to_lots no longer applies a
  # configured floor; uses the broker's actual min_volume from symbol_info.
  # If the computed lot value is below the broker's min_volume, the position
  # is skipped (qty=0 → "below_min_volume") instead of being upsized.
  symbol_map_path: configs/mt5_symbol_map.yaml
# Alerting framework — multi-channel dispatch for engine events.
# Each channel supports its own config keys; unconfigured channels are skipped.
# Environment variable values take precedence over YAML.
alerting:
  channels:
    pagerduty:
      enabled: false
      routing_key: ""
      min_interval: 30.0
    webhook:
      enabled: false
      url: ""
      format: slack
      min_interval: 10.0
# Ensemble is configured programmatically per-asset after regime model training.
# Config values here serve as global defaults for all assets.
ensemble:
  base_weight: 1.0
  threshold: 0.15
  regime_feature_window: 63
meta_labeling:
  confidence_threshold: 0.4
  threshold_reduced: 0.4
calibration:
  enabled: true
  method: binned
  n_bins: 10
  min_samples_per_bin: 5
  model_dir: paper_trading/models/calibration
kelly:
  enabled: false
  fraction: 0.25
  max_cap: 1.0
  min_edge: 0.0
portfolio_drawdown_limit: -0.15
portfolio:
  # factor_constrained_v2: risk parity with hard linear inequality factor constraints.
  # total_R = 124.45, sharpe_adj = 15.40, max_dd_R = -0.62.
  # Readopted 2026-06-25: best risk-return tradeoff across all methods; factor
  # constraints (CHF ≤ 0.20) bind via SLSQP direct linear constraints.
  weight_method: factor_constrained_v2
defaults:
  rolling_window_bars: 756 # 3 years of daily bars for rolling training window; null/omitted = expanding window
  churn_ratio_threshold: 0.35
  cooldown_half_life_hours: 4.0
  cooldown_max_penalty_pct: 20.0
  entry_defer_max_bars: 5
  min_flip_interval_bars: 3
  min_confidence: 55.0
  max_entry_slippage_pct: 2.0
  profit_lock_threshold_pct: 15.0
  max_position_pct_of_equity: 0.15
  max_risk_per_trade_pct: 2.0
  min_viable_position_pct: 0.01
  size_taper_start_dd: -0.05
  size_taper_end_dd: -0.15
  size_taper_min: 0.50
  max_positions_per_asset: 2
# Live in stacking.py / entry_service.py. dry_run reflects that paper positions
# are not scaled-up per layer; the read path is kept intact for research callers.
# REMOVED IF enabled flips to true AND a subsequent retract-or-reactivate pass
# lands (Phase 10 of the configuration refactor).
  stacking:
    enabled: false
    dry_run: true
    max_layers: 3
    layer_multipliers: [0.8, 0.5, 0.3]
    min_confidence: 60.0
    stack_target_vol: 0.15
    stack_vol_clamp: [0.3, 1.2]
    min_stack_size_factor: 0.5
    stack_micro_threshold: 0.0
    cooldown_minutes: 0
    min_stack_r: 0.5
    stack_spacing_r: 0.5
    stack_sl_tighten: 0.5
    breakeven_threshold_r: 0.4
    trail_activate_r: 0.8
    trail_distance_r: 0.7
    trail_step_r: 0.25
    adx_threshold: 25
    size_cap: 1.0
    stack_max_risk_growth: 1.0
  adaptive_exit:
    enabled: true
    be_lock_r: 0.5
    trail_activation_r: 0.5
    trail_retrace_pct: 0.33
    max_hold_candles: 40
    time_decay_start: 20
    scale_out_fraction: 0.7
    scale_out_r: 2.5
  portfolio_max_leverage: 2.0
  portfolio_leverage_tolerance: 0.001
  mt5_leverage_budget_enabled: false
  mt5_leverage_budget_soft: true
  net_short_concentration_threshold: 0.75
  # ── MT5 Risk Control Flags ──────────────────────────────────────────
  # Three flags with a clean separation of concerns:
  #
  #   mt5_enable_max_risk_per_trade_pct  master switch for the MT5 risk cap
  #   mt5_max_risk_per_trade_pct         the percentage value (ignored when above is false)
  #   mt5_bypass_risk_cap_at_min_lot     when risk cap IS enabled, allows min lot bump
  #
  # Truth table:
  #   enable=false, bypass=X -> risk cap disabled entirely, bump handles min lots
  #   enable=true,  bypass=true -> risk cap enforced, min lots bumped anyway
  #   enable=true,  bypass=false -> risk cap fully enforced, no bump
  #
  # ── Master switch for MT5 risk-per-trade cap ───────────────────────
  # When false (default), no percentage-based risk limit is applied to MT5
  # positions. The broker's margin controls are the real gate — if buying
  # power is exceeded, MT5 rejects the order. The min-viable lot bump in
  # _compute_mt5_qty handles sub-minimum positions regardless.
  mt5_enable_max_risk_per_trade_pct: false
  # MT5-specific percentage (% of equity). Only inspected when the master
  # switch above is true. Paper uses its own max_risk_per_trade_pct (2.0).
  mt5_max_risk_per_trade_pct: 10.0
  # When true AND mt5_enable_max_risk_per_trade_pct is true, MT5 positions
  # below the broker's minimum lot get bumped up to the minimum viable
  # volume even if the bump would exceed the configured risk percentage.
  mt5_bypass_risk_cap_at_min_lot: true
  # SELL_ONLY_ASSETS: assets where BUY signal is inverted (p_long > 0.5 → ~17% WR).
  # These assets trade SELL only; BUY signals are overridden to FLAT.
  # Derived from walk-forward BUY inversion discovery (2026-06-20).
  # Removed from SELL_ONLY 2026-06-26: GBPJPY, USDCHF, EURCHF, USDJPY, ^DJI
  sell_only_assets:
    - CADCHF
    - NZDCHF
    - EURAUD
  spread_gate:
    enabled: true
    staleness_secs: 300
    min_observe_cycles: 720
    tiers:
      fx_major: 10
      fx_cross: 20
      indices: 15
      metals: 20
  session_gate:
    enabled: true
    min_observe_cycles: 720
    tiers:
      fx_major: [7, 17]
      fx_cross: [7, 17]
      indices: [13, 20]
      metals: [8, 18]
      crypto: [0, 24]
# ── Feature flags (governed under feature_flags.yaml in Phase 10) ────────────
# Each subsystem carries `enabled: false, observe_only: true`. The corresponding
# code path in paper_trading/execution/decision_pipeline.py and
# paper_trading/services/entry_service.py reads them but skips enforcement.
# Deletion requires removing the matching Python gating, which is deferred
# until a successor feature promotes the gate to active governance.
  adx_entry_gate:
    enabled: false
    observe_only: true
    adx_threshold: 18
# Read by apply_entry_optimization / entry_service. Allowed values are
# zero-clamped by apply_bar_jump_suppression. Safe to leave in place.
  entry_optimization:
    mom_max_pressure: 0.9
    mom_min_pressure: 0.1
    mr_extreme_high: 0.85
    mr_extreme_low: 0.15
    breakout_max_compression: 0.05
optimizations:
